name: Unity Tests

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.testMode }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        testMode: [EditMode, PlayMode]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/Scripts/**', 'Assets/Settings/**', 'Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/*.asset') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-

      - name: Run ${{ matrix.testMode }} tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.6f1
          testMode: ${{ matrix.testMode }}
          artifactsPath: TestResults
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Test Results (${{ matrix.testMode }})

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results (${{ matrix.testMode }})
          path: TestResults
